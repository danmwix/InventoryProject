{% extends "base.html" %}
{% block content %}

<div class="dashboard-header">
    <h1>Dashboard</h1>
    <p>Live overview of your team's IT assets</p>
</div>

<div class="dashboard-stats">
    <div class="stat-card stat-total">
        <i class="bi bi-collection"></i>
        <span class="stat-number" data-count="{{ total_items }}">0</span>
        <span class="stat-label">Total Items</span>
    </div>
    {% for cat, icon in category_icons.items() %}
    <a href="{{ url_for('index', category=cat) }}"
       class="stat-card {{ 'active' if category_filter == cat else '' }}"
       data-category="{{ cat }}"
       style="--cat-color: {{ category_colors.get(cat, '#64748b') }}">
        <i class="bi {{ icon }}"></i>
        <span class="stat-number" data-count="{{ category_counts.get(cat, 0) }}">0</span>
        <span class="stat-label">{{ cat }}s</span>
    </a>
    {% endfor %}
</div>

<div class="toolbar">
    <div class="search-form">
        <i class="bi bi-search search-icon"></i>
        <input type="text" id="live-search" placeholder="Search serial, model, or brand..." value="{{ query }}" autocomplete="off">
        <span class="search-spinner" id="search-spinner"></span>
        <button type="button" id="clear-filters" class="clear-link {{ '' if (query or category_filter) else 'hidden' }}">Clear</button>
    </div>
    <div class="toolbar-actions">
        <a href="{{ url_for('add_item') }}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Add Item</a>
        <a href="{{ url_for('export_csv') }}" class="btn btn-secondary"><i class="bi bi-download"></i> Export CSV</a>
    </div>
</div>

<div id="results-container" data-category="{{ category_filter }}">
    {% include "_results.html" %}
</div>

<script>
(function () {
    const searchInput = document.getElementById('live-search');
    const resultsContainer = document.getElementById('results-container');
    const spinner = document.getElementById('search-spinner');
    const clearBtn = document.getElementById('clear-filters');
    const categoryCards = document.querySelectorAll('.stat-card[data-category]');

    let currentCategory = resultsContainer.dataset.category || '';
    let debounceTimer;

    function setActiveCard() {
        categoryCards.forEach(card => {
            card.classList.toggle('active', card.dataset.category === currentCategory);
        });
    }

    function toggleClearButton() {
        const hasFilter = searchInput.value.trim() !== '' || currentCategory !== '';
        clearBtn.classList.toggle('hidden', !hasFilter);
    }

    function runSearch() {
        const q = searchInput.value.trim();
        const params = new URLSearchParams();
        if (q) params.set('q', q);
        if (currentCategory) params.set('category', currentCategory);

        spinner.classList.add('spinning');
        fetch(`/api/search?${params.toString()}`)
            .then(res => res.text())
            .then(html => {
                resultsContainer.innerHTML = html;
                spinner.classList.remove('spinning');
            })
            .catch(() => { spinner.classList.remove('spinning'); });

        const newUrl = `${window.location.pathname}?${params.toString()}`;
        window.history.replaceState({}, '', newUrl);
        toggleClearButton();
    }

    searchInput.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(runSearch, 250);
    });

    categoryCards.forEach(card => {
        card.addEventListener('click', (e) => {
            e.preventDefault();
            const cat = card.dataset.category;
            currentCategory = (currentCategory === cat) ? '' : cat;
            setActiveCard();
            runSearch();
        });
    });

    clearBtn.addEventListener('click', () => {
        searchInput.value = '';
        currentCategory = '';
        setActiveCard();
        runSearch();
    });

    // Animated count-up for the stat numbers on load
    document.querySelectorAll('.stat-number[data-count]').forEach(el => {
        const target = parseInt(el.dataset.count, 10) || 0;
        let current = 0;
        const step = Math.max(1, Math.ceil(target / 30));
        const timer = setInterval(() => {
            current += step;
            if (current >= target) {
                current = target;
                clearInterval(timer);
            }
            el.textContent = current;
        }, 20);
    });

    toggleClearButton();
})();
</script>
{% endblock %}
