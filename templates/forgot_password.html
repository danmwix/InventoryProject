{% extends "base.html" %}
{% block content %}
<div class="auth-card">
    <h2>Forgot Password</h2>
    <form method="POST">
        <label>Email</label>
        <input type="email" name="email" required>
        <button type="submit">Notify Admin</button>
    </form>
    <p class="hint">Your admin will reset your password and give you a temporary one directly.</p>
    <p><a href="{{ url_for('login') }}">Back to login</a></p>
</div>
{% endblock %}
