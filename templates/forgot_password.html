{% extends "base.html" %}
{% block content %}
<div class="auth-card">
    <h2>Forgot Password</h2>
    <form method="POST">
        <label>Email</label>
        <input type="email" name="email" required>
        <button type="submit">Send reset link</button>
    </form>
    <p class="hint">This is a placeholder — reset emails aren't wired up yet.</p>
</div>
{% endblock %}
